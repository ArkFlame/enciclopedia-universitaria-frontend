# _config.yml
title: Enciclopedia Universitaria
description: La enciclopedia colaborativa universitaria más avanzada de habla hispana
baseurl: ""
url: "https://enciclopedia.arkflame.com"

# Configuración del backend
backend_url: "https://enciclopedia.arkflame.com/api"

# Google OAuth — REQUIRED to enable Google Sign-In buttons.
# Steps:
#   1. Go to https://console.cloud.google.com
#   2. APIs & Services → Credentials → Create → OAuth 2.0 Client ID → Web application
#   3. Add your site URL under "Authorized JavaScript origins" (e.g. https://enciclopedia.arkflame.com)
#   4. Copy the Client ID (ends in .apps.googleusercontent.com) and paste it below.
# Leave as-is to disable Google Sign-In (the button will be hidden automatically).
google_client_id: "172067620211-8dds3pjnt9bqvsbbfbrvqgod7urgdj0l.apps.googleusercontent.com"

# Build
markdown: kramdown
highlighter: rouge
# Cambiado: asegurar que las páginas salgan con su .html final
permalink: "/:path/:basename:output_ext"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - .env

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
twitter:
  username: enciclopediauniv
author: Enciclopedia Universitaria
lang: es

# Navegación
navigation:
  - title: Inicio
    url: /index.html
  - title: Categorías
    url: /categorias.html
  - title: Sobre nosotros
    url: /acerca.html
  - title: Ayuda
    url: /ayuda.html
