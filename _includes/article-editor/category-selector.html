{% comment %}
Hierarchical category selector component
Provides contextual parent->child selector with hover/click expansion
{% endcomment %}

<div class="hierarchical-category-selector" id="categorySelector">
  <label class="eu-label">Categoría</label>
  <div class="category-picker-layout">
    <div class="category-column" id="categoryColumn"></div>
    <div class="subcategory-column" id="subcategoryColumn" style="display: none;"></div>
  </div>
</div>

<script data-cfasync="false">
(function() {
  var HierarchicalCategorySelector = window.HierarchicalCategorySelector || {};

  var currentCategoryId = null;
  var currentSubcategoryId = null;
  var categoryTree = [];
  var selectedCategory = null;
  var selectedSubcategory = null;
  var initPromise = null;
  var pendingSelection = null;
  var activeParentId = null;

  function renderEmptyState(message) {
    var categoryColumn = document.getElementById('categoryColumn');
    var subcategoryColumn = document.getElementById('subcategoryColumn');

    currentCategoryId = null;
    currentSubcategoryId = null;
    selectedCategory = null;
    selectedSubcategory = null;
    activeParentId = null;

    if (categoryColumn) {
      categoryColumn.innerHTML = '';
      var empty = document.createElement('div');
      empty.className = 'category-option active empty-option';
      empty.textContent = message;
      categoryColumn.appendChild(empty);
    }

    if (subcategoryColumn) {
      subcategoryColumn.style.display = 'none';
      subcategoryColumn.innerHTML = '';
    }

    triggerChange();
  }

  function getApi() {
    if (typeof API !== 'undefined') return API;
    if (window.EU_CONFIG && window.EU_CONFIG.api) return window.EU_CONFIG.api;
    if (window.EU_CONFIG && window.EU_CONFIG.backendUrl) return window.EU_CONFIG.backendUrl;
    return '';
  }

  HierarchicalCategorySelector.init = function() {
    if (initPromise) return initPromise;
    initPromise = loadCategoryTree().then(function() {
      setupEventListeners();
    });
    return initPromise;
  };

  HierarchicalCategorySelector.ready = function() {
    return this.init();
  };

  function loadCategoryTree() {
    var api = getApi();
    return fetch(api + '/api/articles/meta/categories/tree')
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load category tree: ' + res.status);
        return res.json();
      })
      .then(function(data) {
        if (!data || !Array.isArray(data) || data.length === 0) {
          renderEmptyState('No hay categorías');
          return;
        }
        categoryTree = data;
        renderCategoryColumn();
      })
      .catch(function(e) {
        console.warn(e.message);
        renderEmptyState('No hay categorías');
      });
  }

  function findCategoryById(categoryId) {
    return categoryTree.find(function(c) { return c.id === categoryId; }) || null;
  }

  function findSubcategoryById(category, subcategoryId) {
    if (!category || !category.children || !subcategoryId) return null;
    return category.children.find(function(s) { return s.id === subcategoryId; }) || null;
  }

  function renderCategoryColumn() {
    var column = document.getElementById('categoryColumn');
    if (!column) return;

    if (!Array.isArray(categoryTree) || categoryTree.length === 0) {
      renderEmptyState('No hay categorías');
      return;
    }

    column.innerHTML = '';

    var noCat = document.createElement('div');
    noCat.className = 'category-option' + (currentCategoryId === null ? ' active' : '');
    noCat.textContent = 'Sin categoría';
    noCat.dataset.categoryId = '';
    column.appendChild(noCat);

    categoryTree.forEach(function(cat) {
      var el = document.createElement('div');
      el.className = 'category-option';
      el.dataset.categoryId = cat.id;
      el.textContent = cat.name;
      if (cat.children && cat.children.length > 0) {
        el.classList.add('has-children');
        el.dataset.hasChildren = 'true';
      }
      if (currentCategoryId === cat.id) {
        el.classList.add('active');
      }
      column.appendChild(el);
    });
  }

  function renderSubcategoryColumn(parentId) {
    var column = document.getElementById('subcategoryColumn');
    if (!column) return;

    var parent = findCategoryById(parentId);
    if (!parent || !parent.children || parent.children.length === 0) {
      column.style.display = 'none';
      return;
    }

    column.innerHTML = '';

    var header = document.createElement('div');
    header.className = 'subcategory-header';
    header.textContent = parent.name;
    column.appendChild(header);

    var back = document.createElement('div');
    back.className = 'category-option back-option';
    back.dataset.categoryId = parentId;
    back.textContent = '← ' + parent.name;
    column.appendChild(back);

    var none = document.createElement('div');
    none.className = 'category-option sub-option none-option';
    none.dataset.categoryId = parentId;
    none.textContent = 'Sin subcategoría';
    if (currentCategoryId === parentId && currentSubcategoryId === null) {
      none.classList.add('active');
    }
    column.appendChild(none);

    parent.children.forEach(function(sub) {
      var el = document.createElement('div');
      el.className = 'category-option sub-option';
      el.dataset.categoryId = parentId;
      el.dataset.subcategoryId = sub.id;
      el.textContent = sub.name;
      if (currentCategoryId === parentId && currentSubcategoryId === sub.id) {
        el.classList.add('active');
      }
      column.appendChild(el);
    });

    column.style.display = 'flex';
  }

  function closeSubcategory() {
    var column = document.getElementById('subcategoryColumn');
    if (column) {
      column.style.display = 'none';
      column.innerHTML = '';
    }
    activeParentId = null;
  }

  function showSubcategory(parentId) {
    activeParentId = parentId;
    renderSubcategoryColumn(parentId);
  }

  function selectCategory(categoryId, subcategoryId) {
    currentCategoryId = categoryId;

    selectedCategory = null;
    selectedSubcategory = null;

    if (categoryId) {
      selectedCategory = findCategoryById(categoryId);
      if (selectedCategory && subcategoryId && selectedCategory.children) {
        selectedSubcategory = findSubcategoryById(selectedCategory, subcategoryId);
      }
    }

    currentSubcategoryId = selectedSubcategory ? selectedSubcategory.id : null;

    if (categoryId && !selectedCategory) {
      currentCategoryId = null;
      currentSubcategoryId = null;
    }

    renderCategoryColumn();

    if (activeParentId && activeParentId !== categoryId) {
      if (categoryId && selectedCategory && selectedCategory.children && selectedCategory.children.length > 0) {
        renderSubcategoryColumn(categoryId);
      } else {
        closeSubcategory();
      }
    }

    triggerChange();
  }

  function setupEventListeners() {
    var column = document.getElementById('categoryColumn');

    if (column) {
      column.addEventListener('click', function(e) {
        var option = e.target.closest('.category-option');
        if (!option) return;

        var catId = option.dataset.categoryId ? parseInt(option.dataset.categoryId) : null;

        if (option.dataset.hasChildren === 'true') {
          selectCategory(catId, null);
          showSubcategory(catId);
        } else {
          selectCategory(catId, null);
        }
      });

      column.addEventListener('mouseover', function(e) {
        var option = e.target.closest('.category-option');
        if (!option || !option.dataset.hasChildren) return;
        var catId = option.dataset.categoryId ? parseInt(option.dataset.categoryId) : null;
        if (catId && catId !== activeParentId) {
          showSubcategory(catId);
        }
      });
    }

    var subColumn = document.getElementById('subcategoryColumn');

    if (subColumn) {
      subColumn.addEventListener('click', function(e) {
        var option = e.target.closest('.category-option');
        if (!option) return;

        if (option.classList.contains('back-option')) {
          selectCategory(parseInt(option.dataset.categoryId), null);
          return;
        }

        var catId = option.dataset.categoryId ? parseInt(option.dataset.categoryId) : null;
        var subId = option.dataset.subcategoryId ? parseInt(option.dataset.subcategoryId) : null;
        selectCategory(catId, subId || null);
      });

      subColumn.addEventListener('mouseover', function(e) {
        var option = e.target.closest('.category-option');
        if (!option || option.classList.contains('back-option')) return;
      });
    }
  }

  function triggerChange() {
    var event = new CustomEvent('categoryChanged', {
      detail: {
        categoryId: currentCategoryId,
        subcategoryId: currentSubcategoryId,
        category: selectedCategory,
        subcategory: selectedSubcategory
      }
    });
    document.dispatchEvent(event);
  }

  HierarchicalCategorySelector.setSelection = function(categoryId, subcategoryId) {
    var doSet = function() {
      selectCategory(categoryId, subcategoryId);
    };

    if (!initPromise) {
      pendingSelection = { categoryId: categoryId, subcategoryId: subcategoryId };
      this.init().then(function() {
        if (pendingSelection && pendingSelection.categoryId === categoryId && pendingSelection.subcategoryId === subcategoryId) {
          pendingSelection = null;
          doSet();
        }
      });
      return;
    }

    if (initPromise && categoryTree.length === 0) {
      pendingSelection = { categoryId: categoryId, subcategoryId: subcategoryId };
      this.init().then(function() {
        if (pendingSelection && pendingSelection.categoryId === categoryId && pendingSelection.subcategoryId === subcategoryId) {
          pendingSelection = null;
          doSet();
        }
      });
      return;
    }

    doSet();
  };

  HierarchicalCategorySelector.getSelection = function() {
    return {
      categoryId: currentCategoryId,
      subcategoryId: currentSubcategoryId,
      category: selectedCategory,
      subcategory: selectedSubcategory
    };
  };

  window.HierarchicalCategorySelector = HierarchicalCategorySelector;
})();
</script>

<style>
.hierarchical-category-selector .category-picker-layout {
  display: flex;
  gap: 0;
}

.hierarchical-category-selector .category-column,
.hierarchical-category-selector .subcategory-column {
  display: flex;
  flex-direction: column;
  background: var(--eu-surface);
  border: 1px solid var(--eu-border);
  border-radius: 0.375rem;
  overflow: hidden;
}

.hierarchical-category-selector .category-column {
  min-width: 180px;
  max-height: 280px;
  overflow-y: auto;
}

.hierarchical-category-selector .subcategory-column {
  min-width: 180px;
  max-height: 280px;
  overflow-y: auto;
  border-left: none;
  border-top-right-radius: 0.375rem;
  border-bottom-right-radius: 0.375rem;
}

.hierarchical-category-selector .category-option {
  padding: 0.5rem 0.75rem;
  cursor: pointer;
  border-bottom: 1px solid var(--eu-border-subtle);
  transition: background-color 0.15s;
  font-size: 0.9rem;
}

.hierarchical-category-selector .category-option:last-child {
  border-bottom: none;
}

.hierarchical-category-selector .category-option:hover {
  background-color: var(--eu-bg-secondary);
}

.hierarchical-category-selector .category-option.active {
  background-color: var(--eu-accent-light);
  color: var(--eu-accent);
  font-weight: 500;
}

.hierarchical-category-selector .category-option.has-children::after {
  content: '▶';
  float: right;
  font-size: 0.6rem;
  margin-top: 0.25rem;
  color: var(--eu-text-muted);
}

.hierarchical-category-selector .subcategory-header {
  padding: 0.4rem 0.75rem;
  background: var(--eu-bg-secondary);
  border-bottom: 1px solid var(--eu-border-subtle);
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--eu-text-secondary);
}

.hierarchical-category-selector .back-option {
  background-color: var(--eu-bg-secondary);
  font-style: italic;
  color: var(--eu-text-muted);
}

.hierarchical-category-selector .sub-option {
  padding-left: 1.25rem;
}
</style>
