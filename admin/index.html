---
layout: default
title: Panel de Moderación
---

<div id="adminPage" style="padding:0;max-width:100%;min-height:80vh">
  <div class="eu-loading" style="min-height:60vh">
    <div class="eu-spinner"></div>
    <span>Verificando permisos...</span>
  </div>
</div>

<style>
.eu-main { padding: 5px; max-width: 100%; }
</style>

<script>
(function() {
  const API = window.EU_CONFIG.backendUrl;
  const BASE = window.EU_CONFIG.baseUrl;

  document.addEventListener('DOMContentLoaded', async () => {
    // CRITICAL FIX: Ensure token is fresh before ANY admin API calls
    if (!Auth.isLoggedIn()) {
      window.location.href = `${BASE}/login.html`;
      return;
    }

    // Try to refresh token first to ensure it's valid
    try {
      await Auth.refreshToken();
    } catch (e) {
      console.error('Token refresh failed:', e);
      window.location.href = `${BASE}/login.html?error=session_expired`;
      return;
    }

    const user = Auth.getUser();
    if (!['MOD','ADMIN'].includes(user?.role)) {
      document.getElementById('adminPage').innerHTML = `<div class="eu-empty-state text-danger" style="min-height:60vh"><i class="bi bi-shield-exclamation fs-1"></i><h3>Acceso denegado</h3><p>Solo moderadores y administradores.</p><p>Tu rol actual: <strong>${user?.role || 'desconocido'}</strong></p><a href="${BASE}/" class="eu-btn-primary mt-3">Inicio</a></div>`;
      return;
    }
    renderAdmin(user);
  });

  function renderAdmin(user) {
    document.getElementById('adminPage').innerHTML = `
      <div class="eu-admin-layout">
        <aside class="eu-admin-sidebar">
          <div class="px-4 py-3 border-bottom" style="border-color:var(--eu-border)!important">
            <div class="fw-bold">${user.role === 'ADMIN' ? '⚙ Administración' : '🛡 Moderación'}</div>
            <div class="small text-muted">${escapeHtml(user.username)}</div>
          </div>
          <nav class="eu-admin-nav pt-2">
            <a href="#" onclick="showSection('dashboard');return false"><i class="bi bi-grid-1x2"></i> Panel</a>
            <a href="#" onclick="showSection('pending');return false"><i class="bi bi-hourglass-split"></i> Pendientes <span id="pendingCount" class="badge bg-warning text-dark ms-auto"></span></a>
            <a href="#" onclick="showSection('approved');return false"><i class="bi bi-check-circle"></i> Aprobados</a>
            <a href="#" onclick="showSection('rejected');return false"><i class="bi bi-x-circle"></i> Rechazados</a>
            <a href="#" onclick="showSection('edits');return false"><i class="bi bi-pencil-square"></i> Ediciones</a>
            ${user.role==='ADMIN'?`<a href="#" onclick="showSection('users');return false"><i class="bi bi-people"></i> Usuarios</a><a href="#" onclick="showSection('logs');return false"><i class="bi bi-list-check"></i> Logs</a><a href="#" onclick="showSection('categories');return false"><i class="bi bi-tags"></i> Categorías</a>`:''}
            <div class="eu-sidebar-divider mx-3"></div>
            <a href="${BASE}/"><i class="bi bi-house"></i> Ver sitio</a>
          </nav>
        </aside>
        <main class="eu-admin-main" id="adminMain">
          <div class="eu-loading"><div class="eu-spinner"></div></div>
        </main>
      </div>`;
    showSection('dashboard');
  }

  window.showSection = function(section) {
    document.querySelectorAll('.eu-admin-nav a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('onclick')?.includes(`'${section}'`));
    });
    const main = document.getElementById('adminMain');
    main.innerHTML = '<div class="eu-loading"><div class="eu-spinner"></div></div>';
    const fns = { dashboard: loadDashboard, pending: () => loadArticles('PENDING'), approved: () => loadArticles('APPROVED'), rejected: () => loadArticles('REJECTED'), edits: loadEdits, users: loadUsers, logs: loadLogs, categories: loadCategoriesAdmin };
    (fns[section] || loadDashboard)();
  };

  // ── DASHBOARD ──────────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/stats`);

      // FIX: Check for HTTP errors and parse error details
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido', code: 'UNKNOWN' }));
        throw new Error(`${errorData.error || 'Error'} (Código: ${errorData.code || res.status}, Rol: ${Auth.getUser()?.role || 'unknown'})`);
      }

      const data = await res.json();

      // FIX: Add nullish coalescing to prevent undefined errors
      const articles = data.articles || { pending: 0, approved: 0, rejected: 0, total: 0 };
      const edits = data.edits || { pending: 0, total: 0 };
      const users = data.users || { free: 0, monthly: 0, mod: 0, admin: 0, total: 0 };
      const payments = data.payments || { total_revenue: 0, total_payments: 0 };

      if (articles.pending > 0) {
        const badge = document.getElementById('pendingCount');
        if (badge) { badge.textContent = articles.pending; badge.classList.remove('d-none'); }
      }

      document.getElementById('adminMain').innerHTML = `
        <h2 class="eu-section-title mb-1">Panel general</h2>
        <p class="eu-section-subtitle mb-4">Resumen de actividad de la enciclopedia</p>

        <div class="row g-3 mb-5">
          ${statCard('Pendientes', articles.pending || 0, 'bi-hourglass-split', '#d97706', "showSection('pending')")}
          ${statCard('Aprobados', articles.approved || 0, 'bi-check-circle-fill', '#15803d', "showSection('approved')")}
          ${statCard('Rechazados', articles.rejected || 0, 'bi-x-circle-fill', '#b91c1c', "showSection('rejected')")}
          ${statCard('Ediciones pend.', edits.pending || 0, 'bi-pencil-square', '#7c3aed', "showSection('edits')")}
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <div class="eu-stat-card">
              <div class="eu-stat-label mb-3">Usuarios por tipo</div>
              <div class="d-flex flex-column gap-2">
                ${userRow('FREE', users.free || 0, '#6b7280')}
                ${userRow('MONTHLY', users.monthly || 0, '#15803d')}
                ${userRow('MOD', users.mod || 0, '#1d4ed8')}
                ${userRow('ADMIN', users.admin || 0, '#b91c1c')}
              </div>
              <div class="eu-divider"></div>
              <div class="fw-semibold">Total: ${users.total || 0} usuarios</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="eu-stat-card">
              <div class="eu-stat-label mb-3">Ingresos</div>
              <div class="eu-stat-number" style="color:var(--eu-success)">$${parseFloat(payments.total_revenue || 0).toLocaleString('es-AR')}</div>
              <div class="text-muted small">ARS en pagos aprobados</div>
              <div class="eu-divider"></div>
              <div class="text-muted small">${payments.total_payments || 0} pagos procesados</div>
            </div>
          </div>
        </div>`;
    } catch (err) {
      console.error('Dashboard error:', err);
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger">
        <strong>Error:</strong> ${escapeHtml(err.message)}<br>
        <small>Usuario: ${escapeHtml(Auth.getUser()?.username || 'unknown')} |
               Rol: ${escapeHtml(Auth.getUser()?.role || 'unknown')}</small>
      </div>`;
    }
  }

  function statCard(label, value, icon, color, onclick) {
    return `<div class="col-6 col-md-3">
      <div class="eu-stat-card" style="cursor:pointer" onclick="${onclick}">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <i class="bi ${icon}" style="font-size:1.4rem;color:${color}"></i>
        </div>
        <div class="eu-stat-number" style="color:${color}">${value}</div>
        <div class="eu-stat-label">${label}</div>
      </div>
    </div>`;
  }

  function userRow(role, count, color) {
    return `<div class="d-flex justify-content-between align-items-center">
      <span class="eu-status-badge eu-status-${role}" style="background:${color}22;color:${color}">${role}</span>
      <strong>${count}</strong>
    </div>`;
  }

  // ── ARTÍCULOS ──────────────────────────────────────────────────
  async function loadArticles(status) {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/articles?status=${status}&limit=30`);

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido' }));
        throw new Error(errorData.error || `Error ${res.status}`);
      }

      const { articles = [], total = 0 } = await res.json();

      const statusLabels = { PENDING: '⏳ Pendientes', APPROVED: '✓ Aprobados', REJECTED: '✕ Rechazados', ALL: 'Todos' };
      const statusColors = { PENDING: '#d97706', APPROVED: '#15803d', REJECTED: '#b91c1c' };

      document.getElementById('adminMain').innerHTML = `
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h2 class="eu-section-title mb-0">Artículos ${statusLabels[status] || status}</h2>
            <p class="text-muted small">${total} artículo(s)</p>
          </div>
        </div>

        ${!articles.length ? '<div class="eu-empty-state"><i class="bi bi-journal-x"></i><p>No hay artículos en esta categoría</p></div>' : `
        <div class="table-responsive">
          <table class="eu-admin-table">
            <thead>
              <tr>
                <th>Estado</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${articles.map(a => `
              <tr>
                <td>
                  <span class="eu-status-badge eu-status-${a.status}">
                    ${a.status === 'PENDING' ? '⏳ Pendiente' : a.status === 'APPROVED' ? '✓ Aprobado' : '✕ Rechazado'}
                  </span>
                </td>
                <td>
                  <div class="fw-semibold" style="max-width:300px">${escapeHtml(a.title)}</div>
                  <div class="text-muted small" style="max-width:300px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${escapeHtml(a.summary)}</div>
                  ${a.rejection_reason ? `<div class="small text-danger mt-1">Motivo: ${escapeHtml(a.rejection_reason)}</div>` : ''}
                </td>
                <td>
                  <div>${escapeHtml(a.author_username)}</div>
                  <div class="small text-muted">${a.author_email}</div>
                  <span class="eu-status-badge" style="background:var(--eu-bg-secondary)">${a.author_role}</span>
                </td>
                <td class="text-muted small text-nowrap">${formatDate(a.created_at)}</td>
                <td>
                  <div class="d-flex gap-1 flex-wrap">
                    <a href="${BASE}/articulo.html?slug=${encodeURIComponent(a.slug)}&includePending=true"
                       class="btn btn-sm btn-outline-secondary" target="_blank" title="Ver artículo">
                       <i class="bi bi-eye"></i>
                    </a>
                    ${a.status !== 'APPROVED' ? `
                    <button class="btn btn-sm btn-success" onclick="updateStatus(${a.id}, 'APPROVED')" title="Aprobar">
                      <i class="bi bi-check-lg"></i>
                    </button>` : ''}
                    ${a.status !== 'REJECTED' ? `
                    <button class="btn btn-sm btn-danger" onclick="rejectArticle(${a.id}, '${escapeHtml(a.title)}')" title="Rechazar">
                      <i class="bi bi-x-lg"></i>
                    </button>` : ''}
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}`;
    } catch (err) {
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger">
        <strong>Error:</strong> ${escapeHtml(err.message)}<br>
        <small>Rol actual: ${escapeHtml(Auth.getUser()?.role || 'unknown')}</small>
      </div>`;
    }
  }

  // ── EDICIONES ──────────────────────────────────────────────────
  async function loadEdits() {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/edits?status=PENDING&limit=50`);

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido' }));
        throw new Error(errorData.error || `Error ${res.status}`);
      }

      const data = await res.json();
      const edits = data.edits || [];
      const total = data.total ?? edits.length;

      document.getElementById('adminMain').innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="eu-section-title mb-0">Ediciones pendientes (${total})</h2>
          <a href="${BASE}/admin/edits.html" class="eu-btn-outline btn-sm"><i class="bi bi-arrow-up-right-square me-1"></i>Vista completa</a>
        </div>
        ${!edits.length ? '<div class="eu-empty-state"><i class="bi bi-pencil"></i><p>No hay ediciones pendientes</p></div>' : `
        <div class="table-responsive">
          <table class="eu-admin-table">
            <thead>
              <tr><th>Artículo</th><th>Editor</th><th>Nota</th><th>Fecha</th><th>Acciones</th></tr>
            </thead>
            <tbody>
              ${edits.map(e => `
              <tr>
                <td>
                  <div class="fw-semibold">${escapeHtml(e.article_title)}</div>
                  ${e.title ? `<div class="small text-muted">Nuevo título: ${escapeHtml(e.title)}</div>` : ''}
                </td>
                <td>${escapeHtml(e.editor_username)} <span class="badge bg-secondary">${e.editor_role}</span></td>
                <td class="text-muted small" style="max-width:200px">${escapeHtml(e.edit_note || '—')}</td>
                <td class="text-muted small text-nowrap">${formatDate(e.created_at)}</td>
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-outline-secondary" onclick="previewEdit(${e.id})" title="Vista previa"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-success" onclick="updateEditStatus(${e.id}, 'APPROVED')"><i class="bi bi-check-lg"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="rejectEdit(${e.id})"><i class="bi bi-x-lg"></i></button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}`;
    } catch (err) {
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger">
        <strong>Error:</strong> ${escapeHtml(err.message)}<br>
        <small>Rol actual: ${escapeHtml(Auth.getUser()?.role || 'unknown')}</small>
      </div>`;
    }
  }

  // ── USUARIOS ──────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/users?limit=50`);

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido' }));
        throw new Error(errorData.error || `Error ${res.status}`);
      }

      const { users = [], total = 0 } = await res.json();

      document.getElementById('adminMain').innerHTML = `
        <h2 class="eu-section-title mb-4">Usuarios (${total})</h2>
        <div class="table-responsive">
          <table class="eu-admin-table">
            <thead>
              <tr><th>Usuario</th><th>Rol</th><th>Email</th><th>Registrado</th><th>Suscripción</th></tr>
            </thead>
            <tbody>
              ${users.map(u => `
              <tr>
                <td class="fw-semibold">${escapeHtml(u.username)}</td>
                <td><span class="eu-status-badge eu-status-${u.role}">${u.role}</span></td>
                <td class="text-muted small">${escapeHtml(u.email)}</td>
                <td class="text-muted small">${formatDate(u.created_at)}</td>
                <td class="small text-muted">${u.monthly_expires_at ? `Expira: ${formatDate(u.monthly_expires_at)}` : '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (err) {
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger">
        <strong>Error:</strong> ${escapeHtml(err.message)}<br>
        <small>Rol actual: ${escapeHtml(Auth.getUser()?.role || 'unknown')}</small>
      </div>`;
    }
  }

  // ── CATEGORÍAS ─────────────────────────────────────────────────
  let categoriesData = [];

  async function loadCategoriesAdmin() {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/categories/tree`);
      if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.error || `Error ${res.status}`); }
      categoriesData = await res.json();
      renderCategoriesList();
    } catch (err) {
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${escapeHtml(err.message)}</div>`;
    }
  }

  function renderCategoriesList() {
    const html = `
      <h2 class="eu-section-title mb-1">Categorías</h2>
      <p class="eu-section-subtitle mb-4">Gestión de categorías de artículos</p>

      <div class="card mb-4" style="background:var(--eu-bg-secondary);border-color:var(--eu-border)">
        <div class="card-body">
          <h5 class="mb-3"><i class="bi bi-plus-circle"></i> Nueva categoría</h5>
          <form id="catCreateForm" class="row g-2" onsubmit="createCategory(event)">
            <div class="col-md-2">
              <input type="text" class="form-control form-control-sm" name="name" placeholder="Nombre" required>
            </div>
            <div class="col-md-2">
              <input type="text" class="form-control form-control-sm" name="slug" placeholder="slug-url" pattern="[a-z0-9-]+" title="Solo minúsculas, números y guiones">
            </div>
            <div class="col-md-2">
              <input type="color" class="form-control form-control-sm" name="color" value="#6366f1" title="Color">
            </div>
            <div class="col-md-3">
              <input type="text" class="form-control form-control-sm" name="description" placeholder="Descripción (opcional)">
            </div>
            <div class="col-md-1">
              <input type="number" class="form-control form-control-sm" name="sort_order" placeholder="Orden" value="0">
            </div>
            <div class="col-md-2">
              <button type="submit" class="btn btn-sm btn-primary w-100"><i class="bi bi-plus-lg"></i> Crear</button>
            </div>
          </form>
        </div>
      </div>

      <div class="table-responsive">
        <table class="eu-admin-table">
          <thead>
            <tr><th>Color</th><th>Nombre</th><th>Slug</th><th>Descripción</th><th>Orden</th><th>Activo</th><th>Acciones</th></tr>
          </thead>
          <tbody id="catTableBody">
            ${categoriesData.length === 0 ? '<tr><td colspan="7" class="text-center text-muted py-4">Sin categorías</td></tr>' : categoriesData.map(c => renderCategoryRow(c)).join('')}
          </tbody>
        </table>
      </div>`;

    document.getElementById('adminMain').innerHTML = html;
  }

  function renderCategoryRow(c) {
    const inactive = c.is_active === 0 || c.is_active === false;
    return `<tr id="cat-row-${c.id}">
      <td><span style="display:inline-block;width:20px;height:20px;border-radius:4px;background:${escapeHtml(c.color || '#6366f1')}"></span></td>
      <td>
        <span id="cat-name-${c.id}">${escapeHtml(c.name)}</span>
        <button class="btn btn-sm text-primary p-0 ms-2" onclick="toggleSubcats(${c.id})" title="Subcategorías" id="subcat-toggle-${c.id}">
          <i class="bi bi-caret-right-fill" id="subcat-icon-${c.id}"></i>
        </button>
      </td>
      <td><code class="small">${escapeHtml(c.slug)}</code></td>
      <td class="small text-muted" style="max-width:200px">${escapeHtml(c.description || '—')}</td>
      <td>${c.sort_order ?? 0}</td>
      <td>${inactive ? '<span class="badge bg-secondary">Inactivo</span>' : '<span class="badge bg-success">Activo</span>'}</td>
      <td>
        <div class="d-flex gap-1 flex-nowrap">
          <button class="btn btn-sm btn-outline-primary" onclick="editCategoryInline(${c.id})" title="Editar"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${c.id})" title="Desactivar"><i class="bi bi-trash"></i></button>
        </div>
        <div id="cat-edit-${c.id}" class="d-none mt-2 p-2 border rounded" style="background:var(--eu-bg-secondary);border-color:var(--eu-border)!important">
          <div class="row g-2">
            <div class="col-md-2"><input type="text" class="form-control form-control-sm" id="e-name-${c.id}" value="${escapeHtml(c.name)}"></div>
            <div class="col-md-2"><input type="text" class="form-control form-control-sm" id="e-slug-${c.id}" value="${escapeHtml(c.slug)}"></div>
            <div class="col-md-1"><input type="color" class="form-control form-control-sm" id="e-color-${c.id}" value="${escapeHtml(c.color || '#6366f1')}"></div>
            <div class="col-md-3"><input type="text" class="form-control form-control-sm" id="e-desc-${c.id}" value="${escapeHtml(c.description || '')}"></div>
            <div class="col-md-1"><input type="number" class="form-control form-control-sm" id="e-sort-${c.id}" value="${c.sort_order ?? 0}"></div>
            <div class="col-md-1"><button class="btn btn-sm btn-success w-100" onclick="saveCategory(${c.id})"><i class="bi bi-check-lg"></i></button></div>
            <div class="col-md-1"><button class="btn btn-sm btn-secondary w-100" onclick="cancelEditCategory(${c.id})"><i class="bi bi-x-lg"></i></button></div>
          </div>
        </div>
      </td>
    </tr>
    <tr id="subcat-row-${c.id}" class="d-none">
      <td colspan="7" class="p-0">
        <div id="subcat-container-${c.id}" class="px-4 py-2" style="background:var(--eu-bg-secondary);border-top:1px solid var(--eu-border)">
          <div id="subcat-list-${c.id}"></div>
        </div>
      </td>
    </tr>`;
  }

  window.toggleSubcats = async function(catId) {
    const row = document.getElementById(`subcat-row-${catId}`);
    const icon = document.getElementById(`subcat-icon-${catId}`);
    if (row.classList.contains('d-none')) {
      row.classList.remove('d-none');
      icon.classList.replace('bi-caret-right-fill', 'bi-caret-down-fill');
      const list = document.getElementById(`subcat-list-${catId}`);
      if (!list.dataset.loaded) {
        list.innerHTML = '<div class="text-muted small"><i class="bi bi-hourglass-split"></i> Cargando...</div>';
        try {
          const res = await Auth.authFetch(`${API}/api/admin/categories/${catId}/subcategories`);
          if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `Error ${res.status}`);
          const subcats = await res.json();
          list.innerHTML = renderSubcatList(catId, subcats);
          list.dataset.loaded = '1';
        } catch (err) {
          list.innerHTML = `<div class="text-danger small">Error: ${escapeHtml(err.message)}</div>`;
        }
      }
    } else {
      row.classList.add('d-none');
      icon.classList.replace('bi-caret-down-fill', 'bi-caret-right-fill');
    }
  };

  function renderSubcatList(catId, subcats) {
    const inactive = s => s.is_active === 0 || s.is_active === false;
    const html = subcats.length === 0
      ? '<div class="text-muted small mb-2">Sin subcategorías</div>'
      : `<table class="table table-sm table-borderless mb-2" style="table-layout:fixed">
           <thead><tr><th style="width:30%">Nombre</th><th style="width:20%">Slug</th><th style="width:25%">Descripción</th><th style="width:10%">Orden</th><th style="width:15%">Acciones</th></tr></thead>
           <tbody>
             ${subcats.map(s => `<tr id="subcat-row-${s.id}">
               <td>${inactive(s) ? `<del class="text-muted">${escapeHtml(s.name)}</del>` : escapeHtml(s.name)}</td>
               <td><code class="small">${escapeHtml(s.slug)}</code></td>
               <td class="small text-muted">${escapeHtml(s.description || '—')}</td>
               <td>${s.sort_order ?? 0}</td>
               <td>
                 <button class="btn btn-sm btn-outline-primary py-0 px-1" onclick="editSubcatInline(${s.id})" title="Editar"><i class="bi bi-pencil"></i></button>
                 <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deleteSubcat(${s.id}, ${catId})" title="Desactivar"><i class="bi bi-trash"></i></button>
               </td>
             </tr>
             <tr id="subcat-edit-${s.id}" class="d-none">
               <td colspan="5">
                 <div class="row g-2 align-items-center">
                   <div class="col-md-3"><input type="text" class="form-control form-control-sm" id="s-name-${s.id}" value="${escapeHtml(s.name)}"></div>
                   <div class="col-md-2"><input type="text" class="form-control form-control-sm" id="s-slug-${s.id}" value="${escapeHtml(s.slug)}"></div>
                   <div class="col-md-3"><input type="text" class="form-control form-control-sm" id="s-desc-${s.id}" value="${escapeHtml(s.description || '')}"></div>
                   <div class="col-md-1"><input type="number" class="form-control form-control-sm" id="s-sort-${s.id}" value="${s.sort_order ?? 0}"></div>
                   <div class="col-md-1"><button class="btn btn-sm btn-success py-0 px-1" onclick="saveSubcat(${s.id}, ${catId})"><i class="bi bi-check-lg"></i></button></div>
                   <div class="col-md-1"><button class="btn btn-sm btn-secondary py-0 px-1" onclick="cancelEditSubcat(${s.id})"><i class="bi bi-x-lg"></i></button></div>
                 </div>
               </td>
             </tr>`).join('')}
           </tbody>
         </table>`;
    return html + `<form class="row g-2 align-items-end" onsubmit="createSubcat(event, ${catId})">
      <div class="col-md-3"><input type="text" class="form-control form-control-sm" name="name" placeholder="Nueva subcategoría" required></div>
      <div class="col-md-2"><input type="text" class="form-control form-control-sm" name="slug" placeholder="slug-url" pattern="[a-z0-9-]+"></div>
      <div class="col-md-3"><input type="text" class="form-control form-control-sm" name="description" placeholder="Descripción"></div>
      <div class="col-md-1"><input type="number" class="form-control form-control-sm" name="sort_order" placeholder="Orden" value="0"></div>
      <div class="col-md-1"><button type="submit" class="btn btn-sm btn-primary py-0 px-1"><i class="bi bi-plus-lg"></i> Agregar</button></div>
    </form>`;
  }

  window.editSubcatInline = function(id) {
    document.querySelectorAll('[id^="subcat-edit-"]').forEach(el => el.classList.add('d-none'));
    document.getElementById(`subcat-edit-${id}`).classList.remove('d-none');
  };

  window.cancelEditSubcat = function(id) {
    document.getElementById(`subcat-edit-${id}`).classList.add('d-none');
  };

  window.createSubcat = async function(e, catId) {
    e.preventDefault();
    const form = e.target;
    const body = {
      category_id: catId,
      name: form.name.value.trim(),
      slug: form.slug.value.trim() || undefined,
      description: form.description.value.trim() || undefined,
      sort_order: parseInt(form.sort_order.value) || 0
    };
    try {
      const res = await Auth.authFetch(`${API}/api/admin/subcategories`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Subcategoría creada', 'success');
      form.reset();
      refreshSubcatList(catId);
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.saveSubcat = async function(id, catId) {
    const body = {
      name: document.getElementById(`s-name-${id}`).value.trim(),
      slug: document.getElementById(`s-slug-${id}`).value.trim(),
      description: document.getElementById(`s-desc-${id}`).value.trim(),
      sort_order: parseInt(document.getElementById(`s-sort-${id}`).value) || 0
    };
    try {
      const res = await Auth.authFetch(`${API}/api/admin/subcategories/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Subcategoría actualizada', 'success');
      document.getElementById(`subcat-edit-${id}`).classList.add('d-none');
      refreshSubcatList(catId);
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.deleteSubcat = async function(id, catId) {
    if (!confirm('¿Desactivar esta subcategoría?')) return;
    try {
      const res = await Auth.authFetch(`${API}/api/admin/subcategories/${id}`, { method: 'DELETE' });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Subcategoría desactivada', 'warning');
      refreshSubcatList(catId);
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  async function refreshSubcatList(catId) {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/categories/${catId}/subcategories`);
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `Error ${res.status}`);
      const subcats = await res.json();
      document.getElementById(`subcat-list-${catId}`).innerHTML = renderSubcatList(catId, subcats);
    } catch (err) { window.showToast(err.message, 'error'); }
  }

  window.editCategoryInline = function(id) {
    document.querySelectorAll('[id^="cat-edit-"]').forEach(el => el.classList.add('d-none'));
    document.getElementById(`cat-edit-${id}`).classList.remove('d-none');
  };

  window.cancelEditCategory = function(id) {
    document.getElementById(`cat-edit-${id}`).classList.add('d-none');
  };

  window.createCategory = async function(e) {
    e.preventDefault();
    const form = e.target;
    const body = {
      name: form.name.value.trim(),
      slug: form.slug.value.trim() || undefined,
      color: form.color.value,
      description: form.description.value.trim() || undefined,
      sort_order: parseInt(form.sort_order.value) || 0
    };
    try {
      const res = await Auth.authFetch(`${API}/api/admin/categories`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Categoría creada', 'success');
      form.reset();
      form.color.value = '#6366f1';
      loadCategoriesAdmin();
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.saveCategory = async function(id) {
    const body = {
      name: document.getElementById(`e-name-${id}`).value.trim(),
      slug: document.getElementById(`e-slug-${id}`).value.trim(),
      color: document.getElementById(`e-color-${id}`).value,
      description: document.getElementById(`e-desc-${id}`).value.trim(),
      sort_order: parseInt(document.getElementById(`e-sort-${id}`).value) || 0
    };
    try {
      const res = await Auth.authFetch(`${API}/api/admin/categories/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Categoría actualizada', 'success');
      document.getElementById(`cat-edit-${id}`).classList.add('d-none');
      loadCategoriesAdmin();
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.deleteCategory = async function(id) {
    if (!confirm('¿Desactivar esta categoría?')) return;
    try {
      const res = await Auth.authFetch(`${API}/api/admin/categories/${id}`, { method: 'DELETE' });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      window.showToast('Categoría desactivada', 'warning');
      loadCategoriesAdmin();
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  // ── LOGS ──────────────────────────────────────────────────────
  async function loadLogs() {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/logs`);

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido' }));
        throw new Error(errorData.error || `Error ${res.status}`);
      }

      const logs = await res.json();

      document.getElementById('adminMain').innerHTML = `
        <h2 class="eu-section-title mb-4">Logs de administración</h2>
        <div class="table-responsive">
          <table class="eu-admin-table">
            <thead><tr><th>Admin</th><th>Acción</th><th>Tipo</th><th>Fecha</th></tr></thead>
            <tbody>
              ${logs.map(l => `<tr>
                <td>${escapeHtml(l.admin_username)}</td>
                <td><code>${escapeHtml(l.action)}</code></td>
                <td class="text-muted">${l.target_type || '—'} #${l.target_id || '—'}</td>
                <td class="text-muted small">${formatDate(l.created_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (err) {
      document.getElementById('adminMain').innerHTML = `<div class="alert alert-danger">
        <strong>Error:</strong> ${escapeHtml(err.message)}<br>
        <small>Rol actual: ${escapeHtml(Auth.getUser()?.role || 'unknown')}</small>
      </div>`;
    }
  }

  // ── ACCIONES ──────────────────────────────────────────────────
  window.updateStatus = async function(id, status) {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/articles/${id}/status`, {
        method: 'PUT',
        body: JSON.stringify({ status })
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      window.showToast(`Artículo ${status === 'APPROVED' ? 'aprobado' : 'actualizado'}`, 'success');
      showSection('pending');
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.rejectArticle = function(id, title) {
    const reason = prompt(`Motivo de rechazo para "${title}" (opcional):`);
    if (reason === null) return;
    Auth.authFetch(`${API}/api/admin/articles/${id}/status`, {
      method: 'PUT',
      body: JSON.stringify({ status: 'REJECTED', reason })
    }).then(res => {
      if (res.ok) { window.showToast('Artículo rechazado', 'warning'); showSection('pending'); }
      else res.json().then(d => window.showToast(d.error, 'error'));
    });
  };

  window.updateEditStatus = async function(id, status) {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/edits/${id}/status`, {
        method: 'PUT',
        body: JSON.stringify({ status })
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      window.showToast('Edición procesada', 'success');
      loadEdits();
    } catch (err) { window.showToast(err.message, 'error'); }
  };

  window.rejectEdit = function(id) {
    const reason = prompt('Motivo de rechazo (opcional):');
    if (reason === null) return;
    Auth.authFetch(`${API}/api/admin/edits/${id}/status`, {
      method: 'PUT',
      body: JSON.stringify({ status: 'REJECTED', reason: reason || '' })
    }).then(res => {
      if (res.ok) { window.showToast('Edición rechazada', 'warning'); loadEdits(); }
      else res.json().then(d => window.showToast(d.error, 'error'));
    });
  };

  window.previewEdit = async function(editId) {
    try {
      const res = await Auth.authFetch(`${API}/api/admin/edit-preview/${editId}`);

      if (!res.ok) {
        const errorData = await res.json().catch(() => ({ error: 'Error desconocido' }));
        throw new Error(errorData.error || `Error ${res.status}`);
      }

      const data = await res.json();
      // ... rest of preview code
      const { originalContent, proposedContent: markdown, original_title, title, edit_note,
              category_name, subcategory_name,
              original_category_name, original_subcategory_name } = data;

      // FIX: html variable was undefined in original code
      const html = markdown ? marked.parse(markdown) : '(sin contenido)';

      const sameCat = original_category_name === category_name || (!original_category_name && !category_name);
      const sameSubcat = original_subcategory_name === subcategory_name || (!original_subcategory_name && !subcategory_name);
      const catChanged = !sameCat || !sameSubcat;

      const modal = document.createElement('div');
      modal.innerHTML = `
        <div class="modal fade" id="editPreviewModal" tabindex="-1">
          <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Vista previa de edición</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <div class="mb-3 p-3 rounded" style="background:var(--eu-bg-secondary);border:1px solid var(--eu-border)">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="small text-muted mb-1">Artículo original</div>
                      <div class="fw-semibold">${escapeHtml(original_title)}</div>
                      <div class="small text-muted">
                        Categoría: <span class="${sameCat ? 'text-muted' : 'text-warning fw-semibold'}">${escapeHtml(original_category_name || '—')}</span>
                        ${!sameCat ? '<i class="bi bi-arrow-right mx-1"></i>' : ''}
                        Subcategoría: <span class="${sameSubcat ? 'text-muted' : 'text-warning fw-semibold'}">${escapeHtml(original_subcategory_name || '—')}</span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="small text-muted mb-1">Propuesta de edición</div>
                      <div class="fw-semibold ${title && title !== original_title ? 'text-success' : ''}">${escapeHtml(title || original_title)}</div>
                      <div class="small text-muted">
                        Categoría: <span class="${sameCat ? 'text-muted' : 'text-success fw-semibold'}">${escapeHtml(category_name || '—')}</span>
                        ${!sameCat ? '<i class="bi bi-arrow-left mx-1"></i>' : ''}
                        Subcategoría: <span class="${sameSubcat ? 'text-muted' : 'text-success fw-semibold'}">${escapeHtml(subcategory_name || '—')}</span>
                      </div>
                    </div>
                  </div>
                </div>
                <ul class="nav nav-tabs mb-3" role="tablist">
                  <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#previewTab">Renderizado</button></li>
                  <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#markdownTab">Markdown</button></li>
                </ul>
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="previewTab">
                    <div class="eu-article-content">${html}</div>
                  </div>
                  <div class="tab-pane fade" id="markdownTab">
                    <pre class="p-3 rounded" style="background:var(--eu-code-bg);overflow-x:auto"><code>${escapeHtml(markdown)}</code></pre>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>`;
      document.body.appendChild(modal.firstElementChild);
      const m = new bootstrap.Modal(document.getElementById('editPreviewModal'));
      m.show();
      document.getElementById('editPreviewModal').addEventListener('hidden.bs.modal', function() { this.remove(); });
    } catch (err) {
      window.showToast(err.message, 'error');
    }
  };

  function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
})();
</script>
