---
layout: default
title: Categorías
description: Explora los artículos de la enciclopedia por categoría temática
---

<div style="max-width:1100px;margin:0 auto;padding:32px 20px">

  <div class="mb-5">
    <h1 class="eu-hero-title">Categorías</h1>
    <p class="text-muted" style="font-size:1.05rem">Explora el conocimiento organizado por área temática</p>
  </div>

  <!-- Category filter selector -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <div class="eu-category-selector" id="categorySelectorContainer" style="max-width:280px">
      <button type="button" class="eu-category-trigger" id="categoryTrigger">
        <span id="categoryLabel">Todas las categorías</span>
        <i class="bi bi-chevron-down"></i>
      </button>
      <div class="eu-category-dropdown" id="categoryDropdown">
        <div class="eu-category-tree" id="categoryTree"></div>
      </div>
    </div>
    <button class="eu-btn-outline btn-sm" id="clearCategoryFilter" style="display:none" onclick="clearCategoryFilter()">
      <i class="bi bi-x"></i> Limpiar
    </button>
  </div>

  <!-- Grid de categorías -->
  <div id="categoriesGrid" class="row g-4 mb-5"></div>

  <!-- Vista de artículos de categoría seleccionada -->
  <div id="categoryView" class="d-none">
    <div class="d-flex align-items-center gap-3 mb-4" style="border-bottom:2px solid var(--eu-border);padding-bottom:16px">
      <button class="eu-btn-outline btn-sm" onclick="closeCategoryView()">
        <i class="bi bi-arrow-left"></i> Todas las categorías
      </button>
      <h2 id="categoryTitle" class="mb-0" style="font-family:var(--eu-font-display);font-size:1.5rem"></h2>
      <span id="categoryCount" class="text-muted small ms-auto"></span>
    </div>
    <div id="categoryArticles"></div>
    <div id="categoryPagination" class="eu-pagination mt-4"></div>
  </div>
</div>

<style>
.eu-cat-card {
  background: var(--eu-surface);
  border: 1px solid var(--eu-border);
  border-radius: var(--eu-radius);
  padding: 28px 24px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.eu-cat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--cat-color, #000);
}
.eu-cat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,.1);
  border-color: var(--cat-color, #000);
}
.eu-cat-icon { font-size: 2rem; margin-bottom: 12px; display: block; }
.eu-cat-name { font-family: var(--eu-font-display); font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
.eu-cat-count { font-size: .85rem; color: var(--eu-text-muted); }
.eu-cat-article {
  padding: 16px 0;
  border-bottom: 1px solid var(--eu-border);
  display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
  text-decoration: none; color: inherit; transition: background .15s;
}
.eu-cat-article:hover { background: var(--eu-bg-secondary); padding-left: 8px; border-radius: var(--eu-radius-sm); }
/* Hierarchical category selector */
.eu-category-selector {
  position: relative;
}
.eu-category-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--eu-surface);
  border: 1px solid var(--eu-border);
  border-radius: var(--eu-radius-sm);
  color: var(--eu-text);
  font-size: 0.9rem;
  cursor: pointer;
  min-width: 180px;
  justify-content: space-between;
  transition: border-color 0.2s;
}
.eu-category-trigger:hover {
  border-color: var(--eu-text-muted);
}
.eu-category-trigger i {
  font-size: 0.75rem;
  transition: transform 0.2s;
}
.eu-category-selector.open .eu-category-trigger i {
  transform: rotate(180deg);
}
.eu-category-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 220px;
  background: var(--eu-surface);
  border: 1px solid var(--eu-border);
  border-radius: var(--eu-radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  z-index: 1000;
  display: none;
  max-height: 320px;
  overflow-y: auto;
}
.eu-category-selector.open .eu-category-dropdown {
  display: block;
}
.eu-category-tree {
  padding: 8px 0;
}
.eu-category-item {
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--eu-text);
  font-size: 0.9rem;
  transition: background 0.15s;
}
.eu-category-item:hover {
  background: var(--eu-bg-secondary);
}
.eu-category-item.selected {
  background: var(--eu-accent);
  color: #fff;
}
.eu-category-item .cat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.eu-category-item .cat-expand {
  margin-left: auto;
  font-size: 0.75rem;
  opacity: 0.6;
}
.eu-category-children {
  padding-left: 24px;
  border-left: 1px solid var(--eu-border);
  margin-left: 16px;
}
.eu-category-children .eu-category-item {
  padding: 6px 12px;
  font-size: 0.85rem;
}
</style>

<script>
(function() {
  const API  = window.EU_CONFIG.backendUrl;
  const BASE = window.EU_CONFIG.baseUrl;
  let catPage = 1;
  let currentCatId = '';
  let currentSubcategoryId = '';
  let categoryTree = [];
  let selectedCategory = null;
  let selectedSubcategory = null;

  const ICONS = {
    'ciencias-naturales': '🌿', 'historia': '📜', 'matematicas': '📐',
    'tecnologia': '💻', 'fisica': '⚛️', 'quimica': '🧪',
    'biologia': '🔬', 'filosofia': '💭', 'arte-cultura': '🎨', 'sociologia': '🏛️'
  };

  // Category selector elements
  const container = document.getElementById('categorySelectorContainer');
  const trigger = document.getElementById('categoryTrigger');
  const dropdown = document.getElementById('categoryDropdown');
  const treeContainer = document.getElementById('categoryTree');
  const label = document.getElementById('categoryLabel');
  const clearBtn = document.getElementById('clearCategoryFilter');

  // Toggle dropdown
  trigger && trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    container.classList.toggle('open');
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!container || !container.contains(e.target)) {
      container.classList.remove('open');
    }
  });

  // Load category tree
  async function loadCategoryTree() {
    try {
      const res = await fetch(`${API}/api/articles/meta/categories/tree`);
      if (!res.ok) return;
      categoryTree = await res.json();
      renderCategoryTree();
    } catch (e) {}
  }

  function renderCategoryTree() {
    if (!treeContainer) return;
    treeContainer.innerHTML = renderCategoryItems(categoryTree);
  }

  function renderCategoryItems(cats, parentId = null) {
    return cats.map(cat => {
      const hasChildren = cat.children && cat.children.length > 0;
      const isSelected = selectedCategory && selectedCategory.id === cat.id;
      const childHtml = hasChildren ? `<div class="eu-category-children">${renderCategoryItems(cat.children, cat.id)}</div>` : '';
      
      return `<div class="eu-category-item ${isSelected ? 'selected' : ''}" data-id="${cat.id}" data-name="${escapeHtml(cat.name)}" data-parent-id="${parentId || ''}">
        <span class="cat-dot" style="background:${cat.color || '#666'}"></span>
        <span>${escapeHtml(cat.name)}</span>
        ${hasChildren ? '<span class="cat-expand">▸</span>' : ''}
      </div>${childHtml}`;
    }).join('');
  }

  // Handle category selection
  treeContainer && treeContainer.addEventListener('click', (e) => {
    const item = e.target.closest('.eu-category-item');
    if (!item) return;

    const catId = item.dataset.id;
    const catName = item.dataset.name;
    const parentId = item.dataset.parentId;

    if (parentId) {
      selectedCategory = categoryTree.find(c => c.id === parseInt(parentId));
      selectedSubcategory = { id: parseInt(catId), name: catName };
      currentCatId = parentId;
      currentSubcategoryId = catId;
    } else {
      selectedCategory = categoryTree.find(c => c.id === parseInt(catId));
      selectedSubcategory = null;
      currentCatId = catId;
      currentSubcategoryId = '';
    }

    updateLabel();
    container.classList.remove('open');
    clearBtn.style.display = 'inline-flex';
    filterByCategory();
  });

  function updateLabel() {
    if (!selectedCategory) {
      label.textContent = 'Todas las categorías';
    } else if (selectedSubcategory) {
      label.textContent = `${selectedCategory.name} / ${selectedSubcategory.name}`;
    } else {
      label.textContent = selectedCategory.name;
    }
  }

  window.clearCategoryFilter = function() {
    selectedCategory = null;
    selectedSubcategory = null;
    currentCatId = '';
    currentSubcategoryId = '';
    updateLabel();
    clearBtn.style.display = 'none';
    filterByCategory();
  };

  function filterByCategory() {
    if (!selectedCategory) {
      document.getElementById('categoriesGrid').classList.remove('d-none');
      const catView = document.getElementById('categoryView');
      if (catView) catView.classList.add('d-none');
      return;
    }
    openCategory(currentCatId, selectedCategory.name, selectedCategory.color);
  }

  // Init with URL params
  async function init() {
    await loadCategoryTree();
    const params = new URLSearchParams(window.location.search);
    const catId = params.get('categoryId');
    const subId = params.get('subcategoryId');
    const catSlug = params.get('category');

    if (catId && categoryTree.length) {
      if (subId) {
        const parent = categoryTree.find(c => c.id === parseInt(catId));
        if (parent && parent.children) {
          const child = parent.children.find(s => s.id === parseInt(subId));
          if (child) {
            selectedCategory = parent;
            selectedSubcategory = child;
            currentCatId = catId;
            currentSubcategoryId = subId;
          }
        }
      } else {
        selectedCategory = categoryTree.find(c => c.id === parseInt(catId));
        if (selectedCategory) {
          currentCatId = catId;
        }
      }
      updateLabel();
      clearBtn.style.display = 'inline-flex';
    } else if (catSlug && categoryTree.length) {
      const cat = categoryTree.find(c => c.slug === catSlug);
      if (cat) {
        selectedCategory = cat;
        currentCatId = String(cat.id);
        updateLabel();
        clearBtn.style.display = 'inline-flex';
      }
    }

    loadCategories();
  }

  async function loadCategories() {
    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '<div class="col-12 text-center py-5"><div class="eu-spinner mx-auto mb-3"></div><p class="text-muted">Cargando categorías...</p></div>';

    try {
      const res = await fetch(`${API}/api/articles/meta/categories`);
      const cats = await res.json();

      // Fetch article counts per category in parallel
      const counts = await Promise.all(cats.map(c =>
        fetch(`${API}/api/articles?categoryId=${c.id}&limit=1`)
          .then(r => r.json())
          .then(d => ({ id: c.id, slug: c.slug, count: d.total || 0 }))
          .catch(() => ({ id: c.id, slug: c.slug, count: 0 }))
      ));
      const countMap = Object.fromEntries(counts.map(c => [c.id, c.count]));

      if (!cats.length) {
        grid.innerHTML = '<div class="col-12"><div class="eu-empty-state"><i class="bi bi-tag"></i><p>No hay categorías definidas</p></div></div>';
        return;
      }

      grid.innerHTML = cats.map(c => `
        <div class="col-6 col-md-4 col-lg-3">
          <div class="eu-cat-card" style="--cat-color:${c.color}" onclick="openCategory(${c.id}, '${escHtml(c.name)}', '${c.color}')">
            <span class="eu-cat-icon">${ICONS[c.slug] || '📁'}</span>
            <div class="eu-cat-name">${escHtml(c.name)}</div>
            <div class="eu-cat-count">${countMap[c.id] || 0} artículo${countMap[c.id] !== 1 ? 's' : ''}</div>
          </div>
        </div>`).join('');

      // If category selected from URL, open it
      if (selectedCategory) {
        openCategory(currentCatId, selectedCategory.name, selectedCategory.color);
      }
    } catch(e) {
      grid.innerHTML = '<div class="col-12"><div class="alert alert-danger">Error al cargar categorías</div></div>';
    }
  }

  window.openCategory = async function(catId, name, color) {
    currentCatId = catId;
    catPage = 1;
    document.getElementById('categoriesGrid').classList.add('d-none');
    const view = document.getElementById('categoryView');
    view.classList.remove('d-none');
    document.getElementById('categoryTitle').innerHTML =
      `<span style="color:${color}">${escHtml(name)}</span>`;
    await loadCategoryArticles(catId, 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.closeCategoryView = function() {
    document.getElementById('categoryView').classList.add('d-none');
    document.getElementById('categoriesGrid').classList.remove('d-none');
    currentCatId = '';
    currentSubcategoryId = '';
  };

  async function loadCategoryArticles(catId, page) {
    const container = document.getElementById('categoryArticles');
    container.innerHTML = '<div class="py-4 text-center"><div class="eu-spinner mx-auto"></div></div>';
    try {
      const url = new URL(`${API}/api/articles`);
      url.searchParams.set('page', page);
      url.searchParams.set('limit', '20');
      url.searchParams.set('categoryId', catId);
      if (currentSubcategoryId) url.searchParams.set('subcategoryId', currentSubcategoryId);
      
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('categoryCount').textContent =
        `${data.total} artículo${data.total !== 1 ? 's' : ''}`;

      const articles = data.articles || [];
      if (!articles.length) {
        container.innerHTML = '<div class="eu-empty-state"><i class="bi bi-journal-x"></i><p>No hay artículos en esta categoría aún</p></div>';
        return;
      }

      container.innerHTML = articles.map(a => `
        <a href="${BASE}/articulo.html?slug=${encodeURIComponent(a.slug)}" class="eu-cat-article">
          <div>
            <div style="font-family:var(--eu-font-display);font-size:1rem;font-weight:700;margin-bottom:3px">${escHtml(a.title)}</div>
            <div style="font-size:.85rem;color:var(--eu-text-muted);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden">${escHtml(a.summary)}</div>
            <div style="font-size:.78rem;color:var(--eu-text-muted);margin-top:4px">
              <i class="bi bi-person" style="margin-right:4px"></i>${escHtml(a.author_username)} ·
              <i class="bi bi-calendar3" style="margin-right:4px"></i>${fmtDate(a.created_at)}
            </div>
          </div>
          <div style="font-size:.8rem;color:var(--eu-text-muted);white-space:nowrap">
            <i class="bi bi-eye"></i> ${(a.views||0).toLocaleString('es-AR')}
          </div>
        </a>`).join('');

      // Pagination
      const pages = Math.ceil(data.total / 20);
      const pag = document.getElementById('categoryPagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let html = '<div class="eu-pagination-inner">';
      for (let i = 1; i <= pages; i++) {
        html += `<button class="${i===page?'active':''}" onclick="catGoPage(${i})">${i}</button>`;
      }
      pag.innerHTML = html + '</div>';
    } catch(e) {
      container.innerHTML = '<div class="alert alert-danger">Error al cargar artículos</div>';
    }
  }

  window.catGoPage = function(p) {
    catPage = p;
    loadCategoryArticles(currentCatId, p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function fmtDate(d) { return new Date(d).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' }); }
  function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  init();
})();
</script>
